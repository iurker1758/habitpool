name: Bug report
description: Something behaves wrong
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include the actual behavior and any error output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: e.g. Android Chrome PWA, Windows dev server
